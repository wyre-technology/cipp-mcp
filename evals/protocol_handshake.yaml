name: cipp-mcp boots over stdio and lists tools
server:
  command: node
  args: [dist/entry.js]
  env:
    AUTH_MODE: "static"
    CIPP_BASE_URL: ""
    CIPP_API_KEY: ""
assert:
  list_tools:
    expect:
      contains_tools:
        - cipp_list_tenants
        - cipp_get_tenant_details
        - cipp_list_users
timeout: 30s
